---
# Ansible tasks for DigitalOcean droplet provisioning
#
# This file is imported by playbooks/provision.yml Play 1 (localhost).
# Creates a droplet with idempotence via unique_name, extracts its IP,
# adds it to the in-memory inventory, and waits for SSH availability.

- name: Get SSH key information from DigitalOcean
  digitalocean.cloud.ssh_keys_info:
    oauth_token: "{{ do_api_token }}"
  register: ssh_keys_result
  changed_when: false

- name: Extract SSH key fingerprint
  set_fact:
    do_ssh_key_fingerprint: "{{ ssh_keys_result.ssh_keys[0].fingerprint }}"
  when: ssh_keys_result.ssh_keys | length > 0

- name: Create DigitalOcean droplet
  digitalocean.cloud.droplet:
    state: present
    name: "{{ droplet_name }}"
    size: "{{ droplet_size }}"
    image: "{{ droplet_image }}"
    region: "{{ droplet_region }}"
    ssh_keys:
      - "{{ do_ssh_key_fingerprint }}"
    unique_name: true
    with_droplet_agent: true
    timeout: 500
    token: "{{ do_api_token }}"
  register: droplet_result

- name: Debug droplet result
  debug:
    var: droplet_result
    verbosity: 1

- name: Extract droplet ID
  set_fact:
    droplet_id: "{{ droplet_result.droplet.id }}"

- name: List existing Reserved IPs on the account
  uri:
    url: "https://api.digitalocean.com/v2/reserved_ips?per_page=200"
    method: GET
    headers:
      Authorization: "Bearer {{ do_api_token }}"
    status_code: [200]
  register: existing_reserved_ips

- name: Detect Reserved IP already assigned to this droplet
  set_fact:
    existing_reserved_ip: "{{ (existing_reserved_ips.json.reserved_ips
                                | selectattr('droplet', 'mapping')
                                | selectattr('droplet.id', 'equalto', droplet_id | int)
                                | map(attribute='ip')
                                | list | first) | default('') }}"

- name: Assign new Reserved IP to droplet
  uri:
    url: "https://api.digitalocean.com/v2/reserved_ips"
    method: POST
    headers:
      Authorization: "Bearer {{ do_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      droplet_id: "{{ droplet_id | int }}"
    status_code: [200, 202]
  register: reserved_ip_result
  when: existing_reserved_ip == ''

- name: Extract static IP address
  set_fact:
    droplet_ip: "{{ existing_reserved_ip if existing_reserved_ip else reserved_ip_result.json.reserved_ip.ip }}"

- name: Detect whether droplet is already hardened (SSH on {{ ssh_port }})
  wait_for:
    host: "{{ droplet_ip }}"
    port: "{{ ssh_port }}"
    timeout: 5
    state: started
  ignore_errors: true
  register: hardened_ssh_check

- name: Wait for default SSH (port 22) on fresh droplet
  wait_for:
    host: "{{ droplet_ip }}"
    port: 22
    timeout: 120
    state: started
  when: hardened_ssh_check is failed

- name: Add fresh droplet to in-memory inventory (root@22)
  add_host:
    name: "{{ droplet_ip }}"
    groups: production
    ansible_user: root
    ansible_port: 22
    ansible_ssh_extra_args: "-o StrictHostKeyChecking=no"
  when: hardened_ssh_check is failed

- name: Add hardened droplet to in-memory inventory (deploy@{{ ssh_port }})
  add_host:
    name: "{{ droplet_ip }}"
    groups: production
    ansible_user: "{{ deploy_user }}"
    ansible_port: "{{ ssh_port }}"
    ansible_ssh_extra_args: "-o StrictHostKeyChecking=no"
  when: hardened_ssh_check is succeeded

- name: Display droplet IP address
  debug:
    msg: |
      Droplet created successfully!
      Reserved (static) IP: {{ droplet_ip }}

      Action required: Set up DNS A record pointing {{ domain_name }} to {{ droplet_ip }}
      This IP is static and will not change even if the droplet is destroyed and recreated.
