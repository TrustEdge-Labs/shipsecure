---
# Application deployment
# Deploys compose file and .env, authenticates with ghcr.io, pulls pre-built images

- name: Create application directory
  file:
    path: "{{ app_directory }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0755'

- name: Deploy production docker-compose file
  template:
    src: ../templates/docker-compose.production.yml.j2
    dest: "{{ app_directory }}/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0644'

- name: Deploy production .env file
  template:
    src: ../templates/env.production.j2
    dest: "{{ app_directory }}/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0600'

- name: Log in to GitHub Container Registry
  shell: echo "{{ ghcr_token }}" | docker login ghcr.io -u "{{ ghcr_username }}" --password-stdin
  become_user: "{{ deploy_user }}"
  changed_when: true
  no_log: true

- name: Pull latest images from ghcr.io
  command: docker compose pull
  args:
    chdir: "{{ app_directory }}"
  become_user: "{{ deploy_user }}"
  changed_when: true
