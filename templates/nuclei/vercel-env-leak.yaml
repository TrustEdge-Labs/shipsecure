id: vercel-env-leak

info:
  name: Vercel Environment Variable Leak
  author: trustedge-audit
  severity: low
  description: |
    Detects Vercel system environment variables exposed in client-side bundles.
    While not secrets themselves, they reveal deployment information and infrastructure details.
  reference:
    - https://vercel.com/docs/concepts/projects/environment-variables
    - https://vercel.com/docs/concepts/projects/environment-variables/system-environment-variables
  tags: vibe-code,vercel,env-leak
  classification:
    cve-id:
    cwe-id: CWE-200

http:
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/_next/static/chunks/main.js"
      - "{{BaseURL}}/_next/static/chunks/pages/_app.js"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "VERCEL_ENV"
          - "VERCEL_URL"
          - "VERCEL_GIT"
          - "VERCEL_BRANCH"
          - "VERCEL_COMMIT"
          - "NEXT_PUBLIC_VERCEL"
        part: body
        condition: or

    extractors:
      - type: regex
        regex:
          - "VERCEL_[A-Z_]+"
          - "NEXT_PUBLIC_VERCEL_[A-Z_]+"
        part: body
