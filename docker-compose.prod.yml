services:
  backend:
    image: ghcr.io/trustedge-labs/shipsecure-backend:latest
    pull_policy: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT:-3000}
      SHIPSECURE_BASE_URL: ${SHIPSECURE_BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      MAX_CONCURRENT_SCANS: ${MAX_CONCURRENT_SCANS:-10}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RUST_LOG: ${RUST_LOG:-info,shipsecure=info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-90}
      HEALTH_DB_LATENCY_THRESHOLD_MS: ${HEALTH_DB_LATENCY_THRESHOLD_MS:-200}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    restart: unless-stopped
    stop_grace_period: 95s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/trustedge-labs/shipsecure-frontend:latest
    pull_policy: always
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      HOSTNAME: 0.0.0.0
      BACKEND_URL: http://backend:3000
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
