services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shipsecure
      POSTGRES_PASSWORD: shipsecure
      POSTGRES_DB: shipsecure_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipsecure -d shipsecure_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://shipsecure:shipsecure@db:5432/shipsecure_dev
    ports:
      - "3000:3000"
    volumes:
      - ./templates:/app/templates:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_BACKEND_URL: http://localhost:3000
    environment:
      BACKEND_URL: http://backend:3000
      NEXT_PUBLIC_BACKEND_URL: http://localhost:3000
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  pgdata:
