---
# Ansible tasks for DigitalOcean droplet provisioning
#
# This file is imported by playbooks/provision.yml Play 1 (localhost).
# Creates a droplet with idempotence via unique_name, extracts its IP,
# adds it to the in-memory inventory, and waits for SSH availability.

- name: Get SSH key information from DigitalOcean
  digitalocean.cloud.ssh_keys_info:
    oauth_token: "{{ do_api_token }}"
  register: ssh_keys_result
  changed_when: false

- name: Extract SSH key fingerprint
  set_fact:
    do_ssh_key_fingerprint: "{{ ssh_keys_result.data[0].fingerprint }}"
  when: ssh_keys_result.data | length > 0

- name: Create DigitalOcean droplet
  digitalocean.cloud.droplet:
    state: present
    name: "{{ droplet_name }}"
    size: "{{ droplet_size }}"
    image: "{{ droplet_image }}"
    region: "{{ droplet_region }}"
    ssh_keys:
      - "{{ do_ssh_key_fingerprint }}"
    unique_name: true
    wait: true
    wait_timeout: 500
    oauth_token: "{{ do_api_token }}"
  register: droplet_result

- name: Extract droplet IP address
  set_fact:
    droplet_ip: "{{ droplet_result.data.droplet.networks.v4[0].ip_address }}"

- name: Add droplet to in-memory inventory
  add_host:
    name: "{{ droplet_ip }}"
    groups: production
    ansible_user: root
    ansible_port: 22
    ansible_ssh_extra_args: "-o StrictHostKeyChecking=no"

- name: Wait for SSH to be available on droplet
  wait_for:
    host: "{{ droplet_ip }}"
    port: 22
    timeout: 120
    state: started

- name: Display droplet IP address
  debug:
    msg: |
      Droplet created successfully!
      IP Address: {{ droplet_ip }}

      Action required: Set up DNS A record pointing {{ domain_name }} to {{ droplet_ip }}
