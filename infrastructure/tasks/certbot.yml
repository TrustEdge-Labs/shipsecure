---
# SSL certificate provisioning with Certbot
# Obtains Let's Encrypt certificate and deploys full HTTPS Nginx config

- name: Install Certbot via apt
  apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present
    update_cache: yes

- name: Check if certificate already exists
  stat:
    path: /etc/letsencrypt/live/{{ domain_name }}/fullchain.pem
  register: cert_exists

- name: Obtain SSL certificate via webroot
  command: >
    certbot certonly --webroot --non-interactive --agree-tos
    --email {{ admin_email }}
    --domain {{ domain_name }}
    -w /var/www/certbot
  when: not cert_exists.stat.exists
  args:
    creates: /etc/letsencrypt/live/{{ domain_name }}/fullchain.pem

- name: Deploy full HTTPS Nginx config
  template:
    src: ../templates/shipsecure.nginx.conf.j2
    dest: /etc/nginx/sites-available/shipsecure
    mode: '0644'

- name: Test Nginx configuration
  command: nginx -t
  changed_when: false

- name: Reload Nginx
  systemd:
    name: nginx
    state: reloaded

# Renewal dry-run intentionally not run during provision.
# Hung intermittently in CI/Ansible runs even with timeouts. Verified working
# manually after install. Cron job handles real renewals unattended.
