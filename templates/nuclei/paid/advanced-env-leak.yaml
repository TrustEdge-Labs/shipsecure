id: shipsecure-paid-advanced-env-leak

info:
  name: Advanced Environment Variable Leak Detection
  author: shipsecure
  severity: high
  description: Detects environment variable leaks in non-obvious locations like production configs, staging env files, and JS config files
  tags: paid,shipsecure,vibe-code,env-leak

http:
  - method: GET
    path:
      - "{{BaseURL}}/.env.production"
      - "{{BaseURL}}/.env.staging"
      - "{{BaseURL}}/.env.local"
      - "{{BaseURL}}/.env.development"
      - "{{BaseURL}}/config.json"
      - "{{BaseURL}}/config.yml"
      - "{{BaseURL}}/settings.json"
      - "{{BaseURL}}/__ENV.js"
      - "{{BaseURL}}/env.js"
      - "{{BaseURL}}/config.js"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: regex
        regex:
          - "DATABASE_URL"
          - "SECRET_KEY"
          - "API_KEY"
          - "PRIVATE_KEY"
          - "AWS_"
        condition: or

      - type: regex
        regex:
          - "<!DOCTYPE|<html|<HTML"
        negative: true

    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - '([A-Z_]+)=([^\n\r]+)'
