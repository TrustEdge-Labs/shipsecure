name: Build and push Docker images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/trustedge-labs/shipsecure-backend:latest
            ${{ env.REGISTRY }}/trustedge-labs/shipsecure-backend:${{ github.sha }}

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          tags: |
            ${{ env.REGISTRY }}/trustedge-labs/shipsecure-frontend:latest
            ${{ env.REGISTRY }}/trustedge-labs/shipsecure-frontend:${{ github.sha }}

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Sync deploy files to production
        uses: appleboy/scp-action@v1
        with:
          host: shipsecure.ai
          username: deploy
          port: 2222
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,deploy/shipsecure.service"
          target: /opt/shipsecure
          overwrite: true

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: shipsecure.ai
          username: deploy
          port: 2222
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            sudo cp /opt/shipsecure/deploy/shipsecure.service /etc/systemd/system/shipsecure.service
            sudo systemctl daemon-reload
            sudo systemctl restart shipsecure

      - name: Post-deploy health check
        uses: appleboy/ssh-action@v1
        env:
          CURRENT_SHA: ${{ github.sha }}
          PREV_SHA: ${{ github.event.before }}
        with:
          host: shipsecure.ai
          username: deploy
          port: 2222
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: CURRENT_SHA,PREV_SHA
          script: |
            echo "Waiting for services to start..."
            sleep 15
            BACKEND=$(curl -sf --max-time 10 http://localhost:3000/health/ready || echo "FAIL")
            FRONTEND=$(curl -sf --max-time 10 -o /dev/null -w "%{http_code}" http://localhost:3001 || echo "000")
            echo "Backend health: $BACKEND"
            echo "Frontend HTTP: $FRONTEND"
            if echo "$BACKEND" | grep -q '"status":"healthy"' && [ "$FRONTEND" = "200" ]; then
              echo "Health check passed for $CURRENT_SHA"
              exit 0
            fi
            echo "Health check FAILED for $CURRENT_SHA — rolling back to $PREV_SHA"
            cd /opt/shipsecure
            sed -i "s|shipsecure-backend:latest|shipsecure-backend:${PREV_SHA}|g" docker-compose.prod.yml
            sed -i "s|shipsecure-frontend:latest|shipsecure-frontend:${PREV_SHA}|g" docker-compose.prod.yml
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            echo "Rollback to $PREV_SHA complete"
            exit 1
