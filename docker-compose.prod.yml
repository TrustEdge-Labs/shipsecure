services:
  db:
    # Disabled in production — using DigitalOcean Managed PostgreSQL
    deploy:
      replicas: 0

  backend:
    image: ghcr.io/trustedge-labs/shipsecure-backend:latest
    pull_policy: always
    # Bind to localhost only (Nginx proxies from host)
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL}
    # Remove template volume mount (use baked-in templates from Docker image)
    volumes: []
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/trustedge-labs/shipsecure-frontend:latest
    pull_policy: always
    # Bind to localhost only (Nginx proxies from host)
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      BACKEND_URL: http://backend:3000
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
