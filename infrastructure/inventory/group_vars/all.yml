---
# DigitalOcean
do_api_token: "{{ vault_do_api_token }}"
droplet_name: shipsecureai
droplet_size: s-2vcpu-4gb
droplet_image: ubuntu-24-04-x64
droplet_region: nyc3

# Domain & SSL
domain_name: "{{ vault_domain_name }}"
admin_email: "{{ vault_admin_email }}"

# SSH
ssh_port: 2222
deploy_user: deploy
deploy_user_ssh_key: "{{ vault_deploy_ssh_public_key }}"

# Application
app_directory: /opt/shipsecure

# Container Registry (GitHub Container Registry)
ghcr_username: "{{ vault_ghcr_username }}"
ghcr_token: "{{ vault_ghcr_token }}"

# Database (DigitalOcean Managed PostgreSQL)
database_url: "{{ vault_database_url }}"

# Secrets (passed to application .env)
resend_api_key: "{{ vault_resend_api_key | default('') }}"
stripe_secret_key: "{{ vault_stripe_secret_key | default('') }}"
stripe_webhook_secret: "{{ vault_stripe_webhook_secret | default('') }}"

# Clerk authentication (Phase 29) — referenced by env.production.j2
clerk_jwks_url: "{{ vault_clerk_jwks_url }}"
clerk_secret_key: "{{ vault_clerk_secret_key | default('') }}"
clerk_publishable_key: "{{ vault_clerk_publishable_key }}"
clerk_webhook_signing_secret: "{{ vault_clerk_webhook_signing_secret | default('') }}"
